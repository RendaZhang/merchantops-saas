server:
  port: 8080

spring:
  application:
    name: merchantops-saas
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

springdoc:
  show-actuator: true
  swagger-ui:
    operations-sorter: alpha
    tags-sorter: alpha
    persist-authorization: true
    try-it-out-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"

merchantops:
  ai:
    enabled: ${MERCHANTOPS_AI_ENABLED:false}
    prompt-version: ${MERCHANTOPS_AI_PROMPT_VERSION:ticket-summary-v1}
    triage-prompt-version: ${MERCHANTOPS_AI_TRIAGE_PROMPT_VERSION:ticket-triage-v1}
    reply-draft-prompt-version: ${MERCHANTOPS_AI_REPLY_DRAFT_PROMPT_VERSION:ticket-reply-draft-v1}
    import-error-summary-prompt-version: ${MERCHANTOPS_AI_IMPORT_ERROR_SUMMARY_PROMPT_VERSION:import-error-summary-v1}
    import-mapping-suggestion-prompt-version: ${MERCHANTOPS_AI_IMPORT_MAPPING_SUGGESTION_PROMPT_VERSION:import-mapping-suggestion-v1}
    import-fix-recommendation-prompt-version: ${MERCHANTOPS_AI_IMPORT_FIX_RECOMMENDATION_PROMPT_VERSION:import-fix-recommendation-v1}
    provider: ${MERCHANTOPS_AI_PROVIDER:OPENAI}
    base-url: ${MERCHANTOPS_AI_BASE_URL:}
    api-key: ${MERCHANTOPS_AI_API_KEY:}
    model-id: ${MERCHANTOPS_AI_MODEL_ID:}
    timeout-ms: ${MERCHANTOPS_AI_TIMEOUT_MS:15000}
    openai-runtime: ${MERCHANTOPS_AI_OPENAI_RUNTIME:RAW_HTTP}
    openai:
      base-url: ${MERCHANTOPS_AI_OPENAI_BASE_URL:}
      api-key: ${MERCHANTOPS_AI_OPENAI_API_KEY:}
  import:
    processing:
      chunk-size: ${IMPORT_PROCESSING_CHUNK_SIZE:100}
      max-rows-per-job: ${IMPORT_PROCESSING_MAX_ROWS_PER_JOB:1000}
      stale-processing-threshold-seconds: ${IMPORT_PROCESSING_STALE_THRESHOLD_SECONDS:300}
      enqueue-recovery-batch-size: ${IMPORT_PROCESSING_ENQUEUE_RECOVERY_BATCH_SIZE:100}
      enqueue-recovery-delay-ms: ${IMPORT_PROCESSING_ENQUEUE_RECOVERY_DELAY_MS:300000}
      enqueue-recovery-min-age-seconds: ${IMPORT_PROCESSING_ENQUEUE_RECOVERY_MIN_AGE_SECONDS:60}
